<!DOCTYPE html>
<html lang="it">

<head>
    <title>Cripta di Sangue - Home</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="assets/css/abyssal.css">
    <style>
        /* Homepage Specific Styles */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }

        /* DASHBOARD LAYOUT */
        .dashboard-wrapper {
            min-height: 100vh;
            height: auto;
            overflow: visible;
        }

        .dashboard-container {
            height: auto;
            min-height: 100%;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            /* Asymmetric split for bottom row */
            grid-template-rows: auto 1fr;
            /* Top row auto height, bottom fills rest */
            gap: 2rem;
            min-height: 0;
            height: auto;
            padding-bottom: 2rem;
            align-items: start;
        }

        /* Row 1: Session spans all columns */
        .next-session-area {
            grid-column: 1 / -1;
            width: 100%;
            min-width: 0;
            overflow: visible;
        }

        /* Row 2: Characters (Left) and Events (Right) */
        .dash-chars-container {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            overflow: hidden;
            /* Prevent spill */
        }

        .dash-events-area {
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(14, 14, 14, 0.56), rgba(10, 10, 10, 0.22));
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .grid-section h2 {
            font-family: var(--font-heading);
            color: var(--gold);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 0.5rem;
        }

        /* NEXT SESSION CARD STYLES (from sessioni.html) */
        .next-session-card {
            background:
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.12), transparent 28%),
                linear-gradient(135deg, rgba(56, 12, 12, 0.92), rgba(12, 12, 14, 0.98));
            border: 1px solid rgba(212, 175, 55, 0.38);
            border-radius: 16px;
            padding: 2.75rem 3rem;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow:
                0 24px 44px rgba(0, 0, 0, 0.34),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                inset 0 0 0 1px rgba(212, 175, 55, 0.06);
            position: relative;
            overflow: hidden;
        }

        .next-label {
            font-family: var(--font-ui);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--ink-warm);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: block;
        }

        .next-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 10px #000;
            line-height: 1;
        }

        .next-details {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .detail-item {
            background: rgba(7, 7, 7, 0.45);
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.16);
            min-width: 150px;
        }

        .detail-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .detail-value {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--ink-ivory);
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            position: relative;
            z-index: 2;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .countdown-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.32);
            padding: 0.6rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 70px;
        }

        .count-number {
            display: block;
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--gold);
        }

        .count-label {
            font-family: var(--font-ui);
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .session-live {
            color: #ff4444;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            animation: pulse 2s infinite;
            margin-top: 1rem;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        /* SESSION CARD STYLES (from sessioni.html) */
        .session-card {
            position: relative;
            background: linear-gradient(180deg, rgba(26, 25, 25, 0.9), rgba(18, 18, 18, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 1.5rem;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .session-card:hover {
            border-color: rgba(212, 175, 55, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.22);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.8rem;
        }

        .session-title {
            font-family: var(--font-heading);
            color: var(--ink-ivory);
            font-size: 1.2rem;
            margin: 0;
        }

        .session-title.text-gold-gradient {
            background: none;
            -webkit-text-fill-color: currentColor;
            color: var(--ink-ivory);
            filter: none;
            text-transform: none;
            letter-spacing: 0.03em;
        }

        .session-date {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--ink-warm);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .session-body {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.6;
        }

        .session-body p {
            margin-bottom: 0;
            /* Adjusted for summary */
        }

        .read-more {
            display: inline-block;
            margin-top: 1rem;
            font-family: var(--font-ui);
            color: var(--ink-warm);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        /* Simplified NPC Card for homepage */
        .home-char-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: linear-gradient(180deg, rgba(24, 24, 24, 0.82), rgba(18, 18, 18, 0.92));
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            margin-bottom: 1.5rem;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
            position: relative;
            overflow: visible;
        }

        .home-char-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.18), transparent 72%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .home-char-card:hover {
            background: linear-gradient(180deg, rgba(28, 28, 28, 0.88), rgba(18, 18, 18, 0.96));
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.16);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.22);
        }

        .home-char-card:hover::before {
            opacity: 1;
        }

        .home-char-avatar {
            position: relative;
            overflow: visible;
            flex: 0 0 auto;
        }

        .home-char-avatar img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 0 6px rgba(0, 0, 0, 0.18);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .home-char-card:hover .home-char-avatar img {
            transform: scale(1.08);
            border-color: rgba(212, 175, 55, 0.42);
        }

        .home-char-info .name {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin: 0 0 0.3rem 0;
            letter-spacing: 0.04em;
            color: var(--ink-ivory);
            transition: color 0.25s ease;
        }

        .home-char-card:hover .home-char-info .name {
            color: #f1e9d5;
        }

        .home-char-info .role {
            font-family: var(--font-ui);
            color: rgba(224, 224, 224, 0.58);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
    </style>
</head>

<body class="page-home">


    <!-- NAVIGAZIONE LATERALE (Vuota - Gestita da layout.js) -->
    <nav class="sidebar" id="sidebar-container">
        <!-- Il contenuto verrà caricato qui automaticamente -->
    </nav>

    <!-- CONTENUTO PRINCIPALE -->
    <main class="main-content dashboard-wrapper">

        <div class="dashboard-container">

            <!-- HEADER (Top) -->
            <header class="dashboard-header">
                <h1>Cripta di Sangue</h1>
                <p>"Coloro che varcano la soglia lasciano ogni speranza, tranne quella della vendetta."</p>
            </header>

            <!-- MAIN GRID -->
            <div class="dashboard-grid">

                <!-- ROW 1: NEXT SESSION (Full Width) -->
                <div class="dash-card next-session-area">
                    <div id="next-session-container"></div>
                </div>

                <!-- ROW 2 - COL 1: CHARACTERS -->
                <div class="dash-chars-container">
                    <div class="dash-section-title">
                        <h2>I Protagonisti</h2>
                        <a href="pages/giocatori.html" class="read-more-mini">Vedi tutti &rarr;</a>
                    </div>

                    <div class="dash-chars-row" id="home-players-row">
                        <!-- Protagonisti caricati dinamicamente -->
                    </div>

                    <div class="dash-section-title" style="margin-top: 1.25rem;">
                        <h2>NPC Recenti</h2>
                        <a href="pages/npcs.html" class="read-more-mini">Vedi tutti &rarr;</a>
                    </div>

                    <div class="dash-chars-row" id="recent-npcs-row">
                        <!-- NPC recenti caricati dinamicamente -->
                    </div>
                </div>

                <!-- ROW 2 - COL 2: LATEST EVENT -->
                <div class="dash-events-area" id="latest-events-section">
                    <h2 class="dash-section-title-small">Ultimi Eventi</h2>
                    <div class="session-card compact">
                        <!-- Contenuto caricato dinamicamente -->
                    </div>
                </div>

            </div>

        </div>
    </main>

    <!-- IMPORTANTE: Lo script che carica la sidebar -->
    <script src="assets/js/layout.js"></script>

    <script src="assets/js/shared/next-session.js"></script>

    <script src="assets/js/pages/index.js"></script>

</body>

</html>
