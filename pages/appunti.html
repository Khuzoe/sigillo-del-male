<!DOCTYPE html>
<html lang="it" data-head-include="../_includes/head.html">

<head>
    <title>Appunti | Cripta di Sangue</title>
    <script src="../assets/js/head.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/abyssal.css">
</head>

<body class="page-appunti">
    <nav class="sidebar" id="sidebar-container"></nav>

    <main class="main-content">
        <header class="hero-mini">
            <div class="hero-title">
                <h1>Appunti</h1>
                <div class="subtitle">Note operative, collegamenti e tracce di sessione</div>
            </div>
        </header>

        <div class="container">
            <section class="notes-shell" aria-label="Editor appunti">
                <aside class="notes-list-panel" aria-label="Lista appunti">
                    <div class="notes-list-top">
                        <button id="note-new-btn" class="notes-command notes-command--primary" type="button">
                            <i class="fas fa-plus" aria-hidden="true"></i>
                            <span>Nuovo</span>
                        </button>
                        <span id="notes-sync-status" class="notes-sync-status">Caricamento...</span>
                    </div>
                    <label id="notes-owner-field" class="notes-owner-field" hidden>
                        <span>Appunti di</span>
                        <select id="notes-owner-select"></select>
                    </label>
                    <label class="notes-search">
                        <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
                        <input id="notes-search" type="search" placeholder="Cerca appunto..." autocomplete="off">
                    </label>
                    <div id="notes-tag-filters" class="notes-tag-filters" aria-label="Filtri collegamenti appunti" hidden></div>
                    <div id="notes-list" class="notes-list"></div>
                </aside>

                <section class="notes-editor-panel" aria-label="Appunto selezionato">
                    <div class="notes-editor-top">
                        <input id="note-title" class="notes-title-input" type="text" placeholder="Titolo appunto">
                        <div class="notes-editor-actions">
                            <label id="note-shared-field" class="notes-shared-field" title="Rendi visibile questo blocco appunti a tutti gli utenti">
                                <input id="note-shared" type="checkbox">
                                <span>Condiviso</span>
                            </label>
                            <button id="note-duplicate-btn" class="notes-icon-btn" type="button" title="Duplica appunto" aria-label="Duplica appunto">
                                <i class="fas fa-copy" aria-hidden="true"></i>
                            </button>
                            <button id="note-delete-btn" class="notes-icon-btn notes-icon-btn--danger" type="button" title="Elimina appunto" aria-label="Elimina appunto">
                                <i class="fas fa-trash" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <div class="notes-toolbar" aria-label="Formattazione">
                        <button class="notes-tool" type="button" data-format-command="bold" title="Grassetto" aria-label="Grassetto">
                            <i class="fas fa-bold" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="italic" title="Corsivo" aria-label="Corsivo">
                            <i class="fas fa-italic" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="underline" title="Sottolineato" aria-label="Sottolineato">
                            <i class="fas fa-underline" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="insertUnorderedList" title="Elenco puntato" aria-label="Elenco puntato">
                            <i class="fas fa-list-ul" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="insertOrderedList" title="Elenco numerato" aria-label="Elenco numerato">
                            <i class="fas fa-list-ol" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="formatBlock" data-format-value="blockquote" title="Citazione" aria-label="Citazione">
                            <i class="fas fa-quote-left" aria-hidden="true"></i>
                        </button>
                        <button class="notes-tool" type="button" data-format-command="removeFormat" title="Rimuovi formato" aria-label="Rimuovi formato">
                            <i class="fas fa-eraser" aria-hidden="true"></i>
                        </button>

                        <span class="notes-toolbar-separator" aria-hidden="true"></span>

                        <button class="notes-link-btn" type="button" data-link-type="npc">
                            <i class="fas fa-skull" aria-hidden="true"></i>
                            <span>NPC</span>
                        </button>
                        <button class="notes-link-btn" type="button" data-link-type="player">
                            <i class="fas fa-dice-d20" aria-hidden="true"></i>
                            <span>Giocatore</span>
                        </button>
                        <button class="notes-link-btn" type="button" data-link-type="item">
                            <i class="fas fa-wand-sparkles" aria-hidden="true"></i>
                            <span>Oggetto</span>
                        </button>
                        <button class="notes-link-btn" type="button" data-link-type="creature">
                            <i class="fas fa-book-dead" aria-hidden="true"></i>
                            <span>Creatura</span>
                        </button>
                    </div>

                    <div id="note-links" class="notes-linked-entities" aria-label="Collegamenti appunto"></div>
                    <div id="note-editor" class="notes-editor" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="true"></div>

                    <div class="notes-editor-footer">
                        <span id="note-updated-at">Nessun appunto selezionato</span>
                        <button id="note-save-btn" class="notes-command" type="button">
                            <i class="fas fa-floppy-disk" aria-hidden="true"></i>
                            <span>Salva ora</span>
                        </button>
                    </div>
                </section>
            </section>
        </div>
    </main>

    <div id="notes-picker-modal" class="notes-picker-modal" hidden>
        <button class="notes-picker-backdrop" type="button" data-close-notes-picker aria-label="Chiudi"></button>
        <section class="notes-picker-card" role="dialog" aria-modal="true" aria-labelledby="notes-picker-title">
            <header class="notes-picker-header">
                <h2 id="notes-picker-title">Collega voce</h2>
                <button class="notes-icon-btn" type="button" data-close-notes-picker aria-label="Chiudi">
                    <i class="fas fa-xmark" aria-hidden="true"></i>
                </button>
            </header>
            <label class="notes-search">
                <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
                <input id="notes-picker-search" type="search" placeholder="Cerca..." autocomplete="off">
            </label>
            <div id="notes-picker-results" class="notes-picker-results"></div>
        </section>
    </div>

    <script src="../assets/js/spoiler-policy.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/pages/appunti.js"></script>
</body>

</html>
