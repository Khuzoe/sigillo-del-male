<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alberi abilita | Reindirizzamento</title>
    <meta http-equiv="refresh" content="0; url=giocatori.html">
</head>
<body>
    <script>
        const target = new URL('giocatori.html', window.location.href);
        const current = new URL(window.location.href);
        current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
        window.location.replace(target.toString());
    </script>
    <p>Gli alberi abilita sono stati spostati nelle schede dei giocatori.</p>
    <p><a href="giocatori.html">Vai ai giocatori</a></p>
</body>
</html>
