<!DOCTYPE html>
<html lang="it">

<head>
    <title>Oggetti | Cripta di Sangue</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/abyssal.css?v=20260715-sidebar-visual2">
    <link rel="stylesheet" href="../assets/css/pages/items-modern.css?v=20260721-item-categories2" data-page-style>
    <link rel="stylesheet" href="../assets/css/pages/npc-categories.css?v=20260721-item-categories2">
    <link rel="stylesheet" href="../assets/css/components/discord-share.css?v=20260715-discord-share3">
</head>

<body class="page-oggetti">
    <nav class="sidebar" id="sidebar-container"></nav>
    <main class="main-content">
        <div class="items-page">
            <header class="items-hero">
                <div class="items-hero-copy">
                    <div class="items-hero-eyebrow"><span></span>Archivio arcano condiviso</div>
                    <h1 id="items-title">Oggetti &amp; Materiali</h1>

                    <div class="items-hero-meta">
                        <span class="items-count-pill"><i class="fas fa-gem" aria-hidden="true"></i><b id="items-count">0 voci</b></span>
                        <span><i class="fas fa-arrows-rotate" aria-hidden="true"></i>Sito e Foundry</span>
                    </div>
                </div>
                <div class="items-hero-sigil" aria-hidden="true">
                    <span class="items-hero-orbit"></span>
                    <span class="items-hero-gem"><i class="fas fa-gem"></i></span>
                </div>
            </header>

            <section class="items-shell" aria-labelledby="items-title">
                <div class="items-tools" aria-label="Cerca e filtra gli oggetti">
                    <div class="items-tools-primary">
                        <label class="items-search">
                            <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
                            <input id="items-search" type="search" placeholder="Cerca nome, proprietà o provenienza..."
                                autocomplete="off">
                            <span class="items-search-shortcut" aria-hidden="true">Cerca</span>
                        </label>
                        <button id="items-create-button" class="items-create-button" type="button" data-requires-dm hidden>
                            <i class="fas fa-plus" aria-hidden="true"></i><span>Nuovo oggetto</span>
                        </button>
                        <button class="items-create-button items-create-button--secondary" type="button" data-item-category-manager hidden>
                            <i class="fas fa-folder-tree" aria-hidden="true"></i><span>Categorie</span>
                        </button>
                    </div>
                    <div class="items-filter-strip">
                        <div class="items-filter-row">
                            <span><i class="fas fa-gem" aria-hidden="true"></i>Rarità</span>
                            <div id="items-rarity-filters" class="items-filter-group" aria-label="Filtro rarità"></div>
                        </div>
                        <div class="items-filter-row">
                            <span><i class="fas fa-shapes" aria-hidden="true"></i>Tipo</span>
                            <div id="items-type-filters" class="items-filter-group" aria-label="Filtro tipo"></div>
                        </div>
                        <div class="items-filter-row">
                            <span><i class="fas fa-folder-tree" aria-hidden="true"></i>Categoria</span>
                            <div id="items-category-filters" class="items-filter-group" aria-label="Filtro categoria"></div>
                        </div>
                        <div class="items-filter-row">
                            <span><i class="fas fa-link" aria-hidden="true"></i>Sintonia</span>
                            <div id="items-attunement-filters" class="items-filter-group" aria-label="Filtro sintonia"></div>
                        </div>
                    </div>
                </div>

                <div class="items-grid" id="items-grid">
                    <p class="items-state">Caricamento degli oggetti...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="../assets/js/spoiler-policy.js"></script>
    <script src="../assets/js/layout.js?v=20260721-campaign-switch1"></script>
    <script src="../assets/js/shared/media-service.js"></script>
    <script src="../assets/js/shared/image-adjust.js"></script>
    <script src="../assets/js/shared/item-normalize.js"></script>
    <script src="../assets/js/shared/economy-service.js?v=20260719-economy1"></script>
    <script src="../assets/js/shared/discord-share.js?v=20260718-discord-image1"></script>
    <script src="../assets/js/shared/item-categories.js?v=20260721-item-categories2"></script>
    <script src="../assets/js/pages/item-category-manager.js?v=20260721-item-categories2"></script>
    <script src="../assets/js/pages/oggetti.js?v=20260721-item-categories2"></script>
</body>

</html>
