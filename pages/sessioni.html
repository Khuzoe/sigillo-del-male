<!DOCTYPE html>
<html lang="it">

<head>
    <title>Diario delle Sessioni | Cripta di Sangue</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/abyssal.css">

    <style>
        /* SCROLL FLUIDO PER TUTTA LA PAGINA */
        html {
            scroll-behavior: smooth;
        }

        /* NEXT SESSION CARD - NUOVO STILE */
        .next-session-card {
            background:
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.12), transparent 28%),
                linear-gradient(135deg, rgba(56, 12, 12, 0.92), rgba(12, 12, 14, 0.98));
            border: 1px solid rgba(212, 175, 55, 0.38);
            border-radius: 16px;
            padding: 2.75rem 3rem;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow:
                0 24px 44px rgba(0, 0, 0, 0.34),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                inset 0 0 0 1px rgba(212, 175, 55, 0.06);
            position: relative;
            overflow: hidden;
        }

        .next-label {
            font-family: var(--font-ui);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--ink-warm);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: block;
        }

        .next-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            margin-bottom: 2rem;
            line-height: 1;
            /* Gold Gradient applied via utility class */
        }

        .next-details {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
            margin-bottom: 2rem;
        }

        .detail-item {
            background: rgba(7, 7, 7, 0.45);
            padding: 1rem 2rem;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.16);
            min-width: 160px;
        }

        .detail-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-family: var(--font-ui);
            letter-spacing: 1px;
        }

        .detail-value {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--ink-ivory);
        }

        /* COUNTDOWN TIMER */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            position: relative;
            z-index: 2;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .countdown-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.32);
            padding: 0.8rem;
            border-radius: 10px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .count-number {
            display: block;
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .count-label {
            font-family: var(--font-ui);
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .session-live {
            color: #ff4444;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            animation: pulse 2s infinite;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                text-shadow: 0 0 10px red;
            }

            50% {
                opacity: 0.7;
                text-shadow: 0 0 20px red;
            }

            100% {
                opacity: 1;
                text-shadow: 0 0 10px red;
            }
        }

        .tbd-message {
            font-family: var(--font-body);
            font-style: italic;
            color: #aaa;
            font-size: 1.3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            display: inline-block;
            min-width: 300px;
        }

        /* STILI PER IL MENU DI NAVIGAZIONE SESSIONI */
        .session-nav {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
            margin-bottom: 3rem;
            padding: 1.75rem;
            background: linear-gradient(180deg, rgba(22, 22, 22, 0.86), rgba(14, 14, 14, 0.94));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .session-nav-title {
            grid-column: 1 / -1;
            font-family: var(--font-heading);
            color: var(--ink-ivory);
            margin-bottom: 0.75rem;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .nav-item {
            display: block;
            padding: 0.75rem 0.6rem;
            background: linear-gradient(180deg, rgba(18, 18, 18, 0.92), rgba(12, 12, 12, 0.96));
            color: var(--text-muted);
            text-align: center;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: var(--font-ui);
            font-size: 0.85rem;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
            text-decoration: none;
        }

        .nav-item:hover {
            border-color: rgba(212, 175, 55, 0.18);
            color: var(--ink-ivory);
            background: linear-gradient(180deg, rgba(24, 24, 24, 0.96), rgba(14, 14, 14, 0.98));
            transform: translateY(-1px);
        }

        .nav-date {
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* STILI SPECIFICI PER LA TIMELINE DELLE SESSIONI - MODALITA' WIDE */
        .timeline {
            position: relative;
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 0 3rem;
        }

        /* Linea laterale a sinistra */
        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 36px;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.18), rgba(212, 175, 55, 0.48), rgba(212, 175, 55, 0.18), transparent);
        }

        .session-card {
            position: relative;
            margin-left: 96px;
            margin-bottom: 3.75rem;
            max-width: 980px;
            width: auto;
            background: linear-gradient(180deg, rgba(24, 23, 24, 0.94), rgba(18, 17, 18, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 2.15rem 2.35rem;
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.24);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            scroll-margin-top: 2rem;
        }

        .session-card:hover {
            border-color: rgba(212, 175, 55, 0.18);
            transform: translateX(3px);
            box-shadow: 0 20px 36px rgba(0, 0, 0, 0.32);
        }

        /* Pallino sulla timeline */
        .timeline-marker {
            position: absolute;
            left: -67px;
            top: 28px;
            width: 18px;
            height: 18px;
            background: linear-gradient(180deg, rgba(28, 26, 25, 1), rgba(13, 13, 13, 1));
            border: 1px solid rgba(212, 175, 55, 0.65);
            border-radius: 50%;
            box-shadow: 0 0 0 5px rgba(12, 12, 12, 0.92);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: var(--gold);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.12);
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.75rem 1rem;
        }

        .session-title {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--ink-ivory);
            letter-spacing: 0.04em;
            margin: 0;
        }

        .session-title.text-gold-gradient {
            background: none;
            -webkit-text-fill-color: currentColor;
            color: var(--ink-ivory);
            filter: none;
            text-transform: none;
        }

        .session-date {
            font-family: var(--font-ui);
            font-size: 0.78rem;
            color: var(--ink-warm);
            background: rgba(0, 0, 0, 0.38);
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .session-body {
            max-width: 70ch;
            font-size: 1.02rem;
            color: var(--text-main);
            margin-bottom: 1.75rem;
            line-height: 1.85;
        }

        .session-body strong {
            color: var(--text-main);
            font-weight: 700;
        }

        .session-body p {
            margin-bottom: 1rem;
        }

        .xp-footer {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-family: var(--font-ui);
            font-size: 1rem;
            background: linear-gradient(90deg, rgba(38, 24, 18, 0.72), rgba(18, 18, 18, 0.65));
            padding: 1rem 1.25rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 2px solid rgba(212, 175, 55, 0.24);
        }

        .xp-value {
            color: var(--text-main);
            font-weight: bold;
        }

        .xp-sub {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .levelup-badge {
            background: rgba(212, 175, 55, 0.14);
            color: var(--ink-ivory);
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            margin-left: 0.8rem;
            text-transform: uppercase;
            font-family: var(--font-ui);
            border: 1px solid rgba(212, 175, 55, 0.25);
        }

        .party-change-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: var(--font-ui);
            border: 1px solid rgba(255, 255, 255, 0.12);
            letter-spacing: 0.04em;
        }

        .party-change-in {
            background: rgba(66, 171, 111, 0.22);
            color: #b8f0cb;
        }

        .party-change-out {
            background: rgba(164, 54, 54, 0.22);
            color: #f3b8b8;
        }

        @media (max-width: 768px) {
            .timeline::before {
                left: 22px;
            }

            .session-card {
                margin-left: 56px;
                padding: 1.5rem;
            }

            .timeline-marker {
                left: -35px;
                width: 16px;
                height: 16px;
                top: 20px;
            }

            .xp-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .next-session-card {
                padding: 1.5rem;
            }

            .next-title {
                font-size: 2rem;
            }

            .countdown-container {
                gap: 0.5rem;
            }

            .countdown-box {
                min-width: 60px;
                padding: 0.5rem;
            }

            .count-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- NAVIGAZIONE LATERALE -->
    <nav class="sidebar" id="sidebar-container">
    </nav>

    <!-- CONTENUTO PRINCIPALE -->
    <main class="main-content">

        <header class="hero-mini">
            <div class="hero-title">
                <h1>Diario delle Sessioni</h1>
                <div class="subtitle">La Cripta di Sangue</div>
            </div>
        </header>

        <div class="container">

            <!-- BOX PROSSIMA SESSIONE (Dinamico) -->
            <div id="next-session-container"></div>

            <!-- MENU DI NAVIGAZIONE RAPIDA -->
            <div class="session-nav" id="session-nav-container">
                <h3 class="session-nav-title">Indice Rapido</h3>
                <!-- I link verranno inseriti qui dinamicamente -->
            </div>

            <div class="timeline" id="timeline-container">
                <!-- Le sessioni verranno inserite qui dinamicamente -->
            </div>

        </div>
    </main>

    <script src="../assets/js/layout.js"></script>

    <script src="../assets/js/shared/next-session.js"></script>

    <script src="../assets/js/pages/sessioni.js"></script>

</body>

</html>
