<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondaggio Sessione | Cripta di Sangue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/abyssal.css">
    <style>
        body.poll-page {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top, rgba(138, 28, 28, 0.16), transparent 36%),
                radial-gradient(circle at bottom right, rgba(212, 175, 55, 0.08), transparent 28%),
                linear-gradient(180deg, #09090d 0%, #120f16 100%);
            color: var(--text-main);
        }

        .poll-page-shell {
            width: min(1520px, calc(100vw - 1rem));
            margin: 0 auto;
            padding: 0.75rem 0 1.5rem;
        }

        .poll-page-topbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.75rem;
            padding: 0 0 0.75rem;
        }

        .poll-page-auth {
            min-width: 0;
            margin-top: 0;
            padding-top: 0;
            border-top: 0;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            gap: 0.6rem;
        }

        .poll-page-auth .discord-auth-status {
            text-align: right;
            margin: 0;
        }

        .poll-page-main {
            display: block;
        }

        .poll-page-panel {
            padding: 0;
            background: transparent;
            border: 0;
            box-shadow: none;
            overflow: visible;
        }

        .poll-page-panel .next-session-card-controls {
            display: none;
        }

        .poll-page-panel .next-label,
        .poll-page-panel .next-title,
        .poll-page-panel .availability-feedback {
            display: none;
        }

        .poll-page-panel .next-session-card,
        .poll-page-panel .next-session-card-poll {
            margin-bottom: 0;
        }

        @media (max-width: 900px) {
            .poll-page-shell {
                width: min(100vw, calc(100vw - 1rem));
                padding: 0.5rem 0 1rem;
            }

            .poll-page-topbar {
                justify-content: stretch;
            }

            .poll-page-auth {
                align-items: flex-start;
                justify-content: flex-start;
            }

            .poll-page-auth .discord-auth-status {
                text-align: left;
            }
        }
    </style>
</head>

<body class="poll-page">
    <div class="poll-page-shell">
        <header class="poll-page-topbar">
            <div class="discord-auth poll-page-auth" aria-label="Accesso Discord">
                <p id="auth-status" class="discord-auth-status">Non loggato</p>
                <button id="discord-login" type="button" class="discord-auth-btn discord-auth-btn--login" aria-label="Login con Discord" title="Login con Discord">
                    <i class="fab fa-discord" aria-hidden="true"></i>
                </button>
                <button id="discord-logout" type="button" class="discord-auth-btn discord-auth-btn--logout" hidden>Logout</button>
            </div>
        </header>

        <main class="poll-page-main">
            <section class="poll-page-panel">
                <div id="next-session-container"></div>
            </section>
        </main>
    </div>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/shared/next-session.js"></script>
    <script src="../assets/js/pages/sondaggio.js"></script>
</body>

</html>
