<!DOCTYPE html>
<html lang="it">
<head>
    <title>NPC | Cripta di Sangue</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/abyssal.css?v=20260715-sidebar-visual2">
    <link rel="stylesheet" href="../assets/css/pages/managed-actors.css?v=20260713-frame-circle2" data-page-style>
    <link rel="stylesheet" href="../assets/css/pages/roster-modern.css?v=20260718-creature-archive2" data-page-style>
    <link rel="stylesheet" href="../assets/css/pages/npc-categories.css?v=20260714-npc-categories2" data-page-style>
    <link rel="stylesheet" href="../assets/css/components/discord-share.css?v=20260715-discord-share3">
    <link rel="stylesheet" href="../assets/css/components/archive-hero.css?v=20260719-archive-hero2">
</head>
<body class="page-npcs roster-page">
    <nav class="sidebar" id="sidebar-container"></nav>
    <main class="main-content">
        <div class="roster-page-inner">
            <header class="roster-hero roster-hero--npcs archive-hero archive-hero--npcs">
                <div class="roster-hero-copy archive-hero__copy">
                    <div class="roster-hero-eyebrow archive-hero__eyebrow"><span></span>Volti della campagna</div>
                    <h1 id="npc-page-title">NPC</h1>

                    <div class="roster-hero-meta archive-hero__meta">
                        <span class="roster-count-pill"><i class="fas fa-masks-theater" aria-hidden="true"></i><b id="npc-count">0 NPC</b></span>
                        <span><i class="fas fa-book-open" aria-hidden="true"></i>Dossier condivisi</span>
                    </div>
                </div>
                <div class="roster-hero-sigil archive-hero__sigil" aria-hidden="true">
                    <span class="roster-hero-orbit archive-hero__orbit"></span>
                    <span class="roster-hero-emblem archive-hero__emblem"><i class="fas fa-masks-theater"></i></span>
                </div>
            </header>

            <section class="roster-shell" aria-labelledby="npc-page-title">
                <div class="roster-tools roster-tools--archive" aria-label="Cerca e filtra NPC e creature">
                    <div class="roster-scope-switch" id="npc-scope-filters" aria-label="Seleziona archivio">
                        <button class="roster-scope-option is-active" type="button" data-roster-scope="npc" aria-pressed="true">
                            <i class="fas fa-masks-theater" aria-hidden="true"></i>
                            <span>NPC</span>
                            <b data-roster-scope-count="npc">0</b>
                        </button>
                        <button class="roster-scope-option" type="button" data-roster-scope="bestiary" aria-pressed="false">
                            <i class="fas fa-dragon" aria-hidden="true"></i>
                            <span>Bestiario</span>
                            <b data-roster-scope-count="bestiary">0</b>
                        </button>
                        <button class="roster-scope-option" type="button" data-roster-scope="all" aria-pressed="false">
                            <i class="fas fa-layer-group" aria-hidden="true"></i>
                            <span>Tutti</span>
                            <b data-roster-scope-count="all">0</b>
                        </button>
                    </div>
                    <label class="roster-search">
                        <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
                        <input id="npc-search" type="search" placeholder="Cerca nome, ruolo, tipo o categoria..." autocomplete="off">
                        <span aria-hidden="true">Cerca</span>
                    </label>
                    <div class="roster-filter-group roster-context-filters" id="npc-status-filters" data-roster-context="npc" aria-label="Filtra gli NPC per stato">
                        <button class="roster-filter is-active" type="button" data-roster-filter="all" aria-pressed="true"><i class="fas fa-layer-group"></i>Tutti</button>
                        <button class="roster-filter" type="button" data-roster-filter="vivo" aria-pressed="false"><i class="fas fa-heart-pulse"></i>Vivi</button>
                        <button class="roster-filter" type="button" data-roster-filter="ignoto" aria-pressed="false"><i class="fas fa-circle-question"></i>Ignoti</button>
                        <button class="roster-filter" type="button" data-roster-filter="morto" aria-pressed="false"><i class="fas fa-skull"></i>Morti</button>
                    </div>
                    <div class="roster-filter-group roster-context-filters" id="bestiary-status-filters" data-roster-context="bestiary" aria-label="Filtra il Bestiario per scoperta" hidden>
                        <button class="roster-filter is-active" type="button" data-bestiary-filter="all" aria-pressed="true"><i class="fas fa-layer-group"></i>Tutte</button>
                        <button class="roster-filter" type="button" data-bestiary-filter="discovered" aria-pressed="false"><i class="fas fa-eye"></i>Scoperte</button>
                        <button class="roster-filter" type="button" data-bestiary-filter="undiscovered" aria-pressed="false"><i class="fas fa-eye-slash"></i>Misteriose</button>
                        <button class="roster-filter" type="button" data-bestiary-filter="hidden" data-bestiary-dm-filter aria-pressed="false" hidden><i class="fas fa-user-shield"></i>Nascoste</button>
                    </div>
                    <button class="roster-secondary-action" type="button" data-npc-category-manager hidden>
                        <i class="fas fa-folder-tree" aria-hidden="true"></i><span>Categorie</span>
                    </button>
                    <a class="roster-primary-action" href="./characters/character.html?type=npc&new=1&edit=1" data-npc-create-link data-requires-dm hidden>
                        <i class="fas fa-plus" aria-hidden="true"></i><span>Nuovo NPC</span>
                    </a>
                </div>

                <div class="npc-list" data-roster-list="npcs">
                    <div class="npc-card npc-card--loading" aria-hidden="true">
                        <div class="npc-avatar-container"></div>
                        <div class="npc-info">
                            <div class="npc-name">Caricamento NPC...</div>
                            <p class="npc-desc">Le anime della campagna stanno emergendo dall’oscurità.</p>
                        </div>
                    </div>
                </div>
                <div class="roster-empty-state" id="npc-filter-empty" hidden>
                    <i class="fas fa-magnifying-glass"></i>
                    <strong data-roster-empty-title>Nessun NPC trovato</strong>
                    <span>Prova a cambiare ricerca o filtro.</span>
                </div>
            </section>
        </div>
    </main>

    <script src="../assets/js/spoiler-policy.js"></script>
    <script src="../assets/js/layout.js?v=20260721-campaign-switch1"></script>
    <script src="../assets/js/shared/markdown.js"></script>
    <script src="../assets/js/shared/media-service.js"></script>
    <script src="../assets/js/shared/image-adjust.js?v=20260713-frame-circle6"></script>
    <script src="../assets/js/shared/roster-media.js?v=20260714-roster-media1"></script>
    <script src="../assets/js/shared/character-normalize.js"></script>
    <script src="../assets/js/shared/npc-categories.js?v=20260714-npc-categories2"></script>
    <script src="../assets/js/pages/npc-category-manager.js?v=20260714-npc-categories2"></script>
    <script src="../assets/js/shared/discord-share.js?v=20260718-discord-image1"></script>
    <script src="../assets/js/pages/npcs.js?v=20260721-npc-status1"></script>
</body>
</html>
