<!DOCTYPE html>
<html lang="it">
<head>
    <title>Mappa Interattiva | Cripta di Sangue</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/abyssal.css">

    <style>
        .container {
            max-width: none !important;
            margin: 0 !important;
            padding: 1rem 1.2rem 1.3rem;
        }

        .map-explorer {
            min-height: calc(100vh - 9.5rem);
        }

        .map-frame {
            position: relative;
            min-height: min(78vh, 820px);
            height: calc(100vh - 12rem);
            border: 1px solid rgba(138, 28, 28, 0.62);
            border-radius: 10px;
            overflow: hidden;
            background: #050505;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
        }

        .map-frame::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            box-shadow: inset 0 0 90px rgba(0, 0, 0, 0.72);
            z-index: 4;
        }

        .map-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: #000;
            cursor: default;
        }

        #map-content {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
        }

        #map-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: 0 0;
            filter: saturate(0.96) contrast(1.04);
        }

        #map-fog-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .fog-of-war-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 35% 30%, rgba(24, 24, 24, 0.8), rgba(2, 2, 2, 0.98)),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 7px);
            opacity: var(--fog-opacity, 0.88);
            backdrop-filter: blur(1.4px) saturate(0.55);
            -webkit-mask: var(--fog-mask);
            mask: var(--fog-mask);
            -webkit-mask-composite: source-out;
            mask-composite: exclude;
        }

        .fog-area {
            position: absolute;
            background:
                radial-gradient(circle at 40% 35%, rgba(24, 24, 24, 0.72), rgba(2, 2, 2, 0.96)),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 7px);
            border: 1px solid rgba(0, 0, 0, 0.48);
            box-shadow: 0 0 28px rgba(0, 0, 0, 0.75), inset 0 0 26px rgba(0, 0, 0, 0.84);
            opacity: var(--fog-opacity, 0.86);
            backdrop-filter: blur(1.5px) saturate(0.55);
        }

        .fog-area--circle {
            border-radius: 50%;
        }

        .map-topbar,
        .map-poi-panel,
        .info-panel {
            position: absolute;
            z-index: 20;
            background: linear-gradient(180deg, rgba(22, 21, 20, 0.9), rgba(8, 8, 8, 0.88));
            border: 1px solid rgba(212, 175, 55, 0.16);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.44);
            backdrop-filter: blur(12px);
        }

        .map-topbar {
            top: 0.9rem;
            left: 0.9rem;
            right: 0.9rem;
            min-height: 3.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.65rem 0.75rem;
            border-radius: 8px;
        }

        .map-breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
            color: rgba(232, 219, 188, 0.72);
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .map-breadcrumb i {
            color: rgba(212, 175, 55, 0.72);
        }

        .map-breadcrumb strong {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #f2dfae;
        }

        .map-actions {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .map-icon-btn {
            width: 2.2rem;
            height: 2.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.22);
            color: rgba(232, 219, 188, 0.74);
            cursor: pointer;
            transition: border-color 160ms ease, color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .map-icon-btn:hover,
        .map-icon-btn:focus-visible {
            border-color: rgba(212, 175, 55, 0.46);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-1px);
        }

        .map-icon-btn:focus-visible {
            outline: 2px solid rgba(212, 175, 55, 0.32);
            outline-offset: 2px;
        }

        .map-zoom-readout {
            min-width: 3.1rem;
            text-align: center;
            color: rgba(232, 219, 188, 0.7);
            font-family: var(--font-ui);
            font-size: 0.68rem;
            font-weight: 800;
        }

        .map-poi-panel {
            top: 5rem;
            left: 0.9rem;
            width: min(21rem, calc(100% - 1.8rem));
            max-height: calc(100% - 6rem);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
        }

        .map-search {
            position: relative;
            display: block;
            padding: 0.8rem 0.8rem 0.55rem;
        }

        .map-search i {
            position: absolute;
            top: 1.58rem;
            left: 1.55rem;
            color: rgba(212, 175, 55, 0.56);
            pointer-events: none;
        }

        .map-search input {
            width: 100%;
            min-height: 2.45rem;
            padding: 0.62rem 0.75rem 0.62rem 2.25rem;
            border: 1px solid rgba(212, 175, 55, 0.16);
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.3);
            color: #f2dfae;
            font-family: var(--font-ui);
            font-size: 0.84rem;
        }

        .map-search input::placeholder {
            color: rgba(232, 219, 188, 0.42);
        }

        .filter-container {
            padding: 0 0.8rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            font-family: var(--font-ui);
        }

        .filter-container strong {
            display: block;
            margin-bottom: 0.45rem;
            color: rgba(232, 219, 188, 0.58);
            font-size: 0.64rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.42rem;
        }

        .map-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.38rem;
            min-height: 1.85rem;
            padding: 0.34rem 0.58rem;
            border: 1px solid rgba(212, 175, 55, 0.13);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.22);
            color: rgba(232, 219, 188, 0.72);
            font-family: var(--font-ui);
            font-size: 0.68rem;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .map-filter-chip:hover,
        .map-filter-chip:focus-visible {
            border-color: rgba(212, 175, 55, 0.38);
            color: #f2dfae;
            transform: translateY(-1px);
        }

        .map-filter-chip.is-active {
            border-color: rgba(212, 175, 55, 0.5);
            background: linear-gradient(180deg, rgba(72, 49, 22, 0.72), rgba(37, 22, 14, 0.72));
            color: #f6df9b;
        }

        .map-filter-dot {
            width: 0.52rem;
            height: 0.52rem;
            border-radius: 50%;
            background: var(--filter-color, var(--gold));
            box-shadow: 0 0 8px color-mix(in srgb, var(--filter-color, var(--gold)) 65%, transparent);
        }

        .poi-list {
            min-height: 0;
            overflow-y: auto;
            padding: 0.55rem;
        }

        .poi-list-empty {
            padding: 1rem 0.75rem;
            color: rgba(232, 219, 188, 0.48);
            font-family: var(--font-ui);
            font-size: 0.78rem;
        }

        .poi-list-item {
            width: 100%;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 0.6rem;
            align-items: center;
            padding: 0.62rem 0.68rem;
            border: 1px solid transparent;
            border-radius: 7px;
            background: transparent;
            color: rgba(232, 219, 188, 0.78);
            cursor: pointer;
            text-align: left;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
        }

        .poi-list-item:hover,
        .poi-list-item.is-active {
            border-color: rgba(212, 175, 55, 0.24);
            background: rgba(212, 175, 55, 0.08);
            color: #f2dfae;
        }

        .poi-list-dot {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 50%;
            background: var(--poi-color, var(--gold));
            box-shadow: 0 0 0 2px rgba(0,0,0,0.6), 0 0 10px color-mix(in srgb, var(--poi-color, var(--gold)) 55%, transparent);
        }

        .poi-list-title {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-ui);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .poi-list-type {
            display: block;
            color: rgba(232, 219, 188, 0.48);
            font-family: var(--font-ui);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.7), 0 0 10px rgba(212, 175, 55, 0.45);
            }
            50% {
                box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.76), 0 0 24px rgba(212, 175, 55, 0.86);
            }
        }

        .poi {
            position: absolute;
            z-index: 12;
            width: 20px;
            height: 20px;
            border-radius: 50% 50% 50% 0;
            border: 2px solid rgba(255, 255, 255, 0.86);
            transform: translate(-50%, -100%) rotate(-45deg);
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.62), 0 3px 10px rgba(0, 0, 0, 0.55);
        }

        .poi::after {
            content: "";
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.82);
        }

        .poi.active,
        .poi:hover {
            border-color: var(--gold);
            z-index: 30;
        }

        .poi.active {
            animation: pulse 2.4s infinite ease-in-out;
        }

        .poi[data-type="Area"] { background-color: #4CAF50; }
        .poi[data-type="Città"] { background-color: #f44336; }
        .poi[data-type="Luogo Generico"] { background-color: #2196F3; }
        .poi[data-visibility="rumored"] {
            opacity: 0.78;
            border-style: dashed;
        }

        .poi[data-visibility="rumored"]::after {
            content: "?";
            display: flex;
            align-items: center;
            justify-content: center;
            color: #17110c;
            font-family: var(--font-ui);
            font-size: 0.7rem;
            font-weight: 900;
            transform: rotate(45deg);
        }
        .poi.hidden { display: none; }
        #map-content.pois-suppressed .poi { display: none; }

        .poi-icon {
            position: absolute;
            inset: -3px;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        .poi-icon i {
            color: #17110c;
            font-size: 0.66rem;
            text-shadow: 0 1px 0 rgba(255,255,255,0.42);
        }

        .poi-label {
            position: absolute;
            bottom: 145%;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            padding: 0.38rem 0.62rem;
            border: 1px solid rgba(212, 175, 55, 0.24);
            border-radius: 6px;
            background: linear-gradient(180deg, rgba(20, 18, 16, 0.96), rgba(7, 7, 7, 0.96));
            color: var(--gold);
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-weight: 800;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
            z-index: 20;
        }

        .poi:hover .poi-label,
        .poi.active .poi-label {
            opacity: 1;
            visibility: visible;
        }

        .info-panel {
            top: 5rem;
            right: 0.9rem;
            width: min(25rem, calc(100% - 1.8rem));
            max-height: calc(100% - 6rem);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transform: translateX(calc(100% + 1.2rem));
            opacity: 0;
            pointer-events: none;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        .info-panel.is-open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .info-panel-inner {
            min-height: 0;
            overflow-y: auto;
            padding: 1.1rem;
        }

        .info-panel-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            z-index: 2;
        }

        .info-panel-header {
            padding-right: 2.6rem;
        }

        .info-panel-kicker {
            display: inline-flex;
            align-items: center;
            margin-bottom: 0.55rem;
            padding: 0.22rem 0.52rem;
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.24);
            color: rgba(232, 219, 188, 0.74);
            font-family: var(--font-ui);
            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .info-panel-title {
            margin: 0 0 0.55rem;
            color: var(--gold);
            font-family: var(--font-heading);
            font-size: clamp(1.45rem, 2.2vw, 2rem);
            line-height: 1.1;
        }

        .info-panel-flavor {
            margin: 0 0 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: rgba(232, 219, 188, 0.72);
            font-family: var(--font-body);
            font-size: 1.02rem;
            font-style: italic;
        }

        .info-panel-image {
            width: 100%;
            max-height: 190px;
            object-fit: contain;
            margin: 0.7rem 0 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            background-color: #000;
        }

        .info-panel-icons {
            display: flex;
            gap: 0.55rem;
            margin-bottom: 0.9rem;
        }

        .info-panel-icon {
            width: 32px;
            height: 32px;
            padding: 0.18rem;
            border: 1px solid rgba(212, 175, 55, 0.16);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.24);
        }

        i.info-panel-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1rem;
        }

        .info-panel-content {
            color: #ddd;
            font-family: var(--font-ui);
            font-size: 0.88rem;
            line-height: 1.65;
        }

        .info-panel-content p {
            margin-bottom: 0.85rem;
        }

        .info-panel-actions {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .enter-button {
            margin-top: 0;
        }

        .map-empty-state {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            z-index: 18;
            max-width: 20rem;
            padding: 0.75rem 0.85rem;
            border: 1px solid rgba(212, 175, 55, 0.14);
            border-radius: 8px;
            background: rgba(8, 8, 8, 0.78);
            color: rgba(232, 219, 188, 0.62);
            font-family: var(--font-ui);
            font-size: 0.75rem;
            backdrop-filter: blur(10px);
        }

        .map-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: rgba(0,0,0,0.92);
            box-sizing: border-box;
        }

        .map-modal.visible {
            display: flex;
        }

        .map-modal-content {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .map-modal-controls {
            position: absolute;
            top: -1.5rem;
            right: 0;
            z-index: 1010;
            display: flex;
            gap: 0.6rem;
        }

        .map-modal-controls button {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold-dim);
            border-radius: 50%;
            background: rgba(30,30,30,0.8);
            color: #fff;
            cursor: pointer;
        }

        .map-modal .map-container {
            position: relative;
            width: 100%;
            height: 100%;
            inset: auto;
            border: 1px solid rgba(212, 175, 55, 0.22);
            border-radius: 8px;
        }

        @media (max-width: 1100px) {
            .map-frame {
                height: calc(100vh - 11rem);
            }

            .map-poi-panel {
                width: min(19rem, calc(100% - 1.8rem));
            }
        }

        @media (max-width: 760px) {
            .container {
                padding: 0.8rem;
            }

            .map-frame {
                height: calc(100vh - 10rem);
                min-height: 620px;
            }

            .map-topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .map-actions {
                width: 100%;
                justify-content: space-between;
            }

            .map-poi-panel {
                top: 7.9rem;
                max-height: 15.5rem;
            }

            .info-panel {
                top: auto;
                bottom: 0.8rem;
                right: 0.8rem;
                left: 0.8rem;
                width: auto;
                max-height: 52%;
                transform: translateY(calc(100% + 1rem));
            }

            .info-panel.is-open {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar-container"></nav>

    <main class="main-content">
        <header class="hero-mini">
            <div class="hero-title">
                <h1>Mappa del Mondo</h1>
                <div class="subtitle">I luoghi perduti e ritrovati</div>
            </div>
            <button id="dev-tools-toggle-btn" style="display: none; position: absolute; top: 1rem; right: 1rem; background: var(--accent-primary); color: #fff; border: 1px solid var(--gold-dim); border-radius: 4px; padding: 0.5rem 0.8rem; cursor: pointer;">Dev Tools</button>
        </header>

        <div class="container">
            <section class="map-explorer" aria-label="Mappa interattiva">
                <div class="map-frame" id="map-frame">
                    <div class="map-container" id="map-container">
                        <div id="map-content">
                            <img src="../assets/img/maps/world_map.webp" id="map-image" alt="Mappa del mondo">
                            <div id="map-fog-layer" aria-hidden="true"></div>
                        </div>
                    </div>

                    <div class="map-topbar">
                        <div class="map-breadcrumb" aria-label="Percorso mappa">
                            <i class="fas fa-map" aria-hidden="true"></i>
                            <strong id="map-breadcrumb-current">Mondo</strong>
                        </div>
                        <div class="map-actions" aria-label="Controlli mappa">
                            <button class="map-icon-btn" id="back-btn" type="button" title="Mappa precedente" aria-label="Mappa precedente" style="display: none;">
                                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                            </button>
                            <button class="map-icon-btn" id="zoom-out-btn" type="button" title="Riduci zoom" aria-label="Riduci zoom">
                                <i class="fas fa-minus" aria-hidden="true"></i>
                            </button>
                            <span class="map-zoom-readout" id="map-zoom-readout">100%</span>
                            <button class="map-icon-btn" id="zoom-in-btn" type="button" title="Aumenta zoom" aria-label="Aumenta zoom">
                                <i class="fas fa-plus" aria-hidden="true"></i>
                            </button>
                            <button class="map-icon-btn" id="reset-view-btn" type="button" title="Reimposta vista" aria-label="Reimposta vista">
                                <i class="fas fa-crosshairs" aria-hidden="true"></i>
                            </button>
                            <button class="map-icon-btn" id="toggle-list-btn" type="button" title="Mostra/Nascondi luoghi" aria-label="Mostra o nascondi lista luoghi">
                                <i class="fas fa-list-ul" aria-hidden="true"></i>
                            </button>
                            <button class="map-icon-btn" id="open-fullscreen-btn" type="button" title="Schermo intero" aria-label="Schermo intero">
                                <i class="fas fa-expand" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <aside class="map-poi-panel" id="poi-panel" aria-label="Luoghi della mappa">
                        <label class="map-search">
                            <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
                            <input id="map-search-input" type="search" placeholder="Cerca luogo..." autocomplete="off">
                        </label>
                        <div id="filter-container" class="filter-container">
                            <strong>Mostra</strong>
                            <div class="filter-options">
                                <button class="map-filter-chip is-active" type="button" data-poi-type="Area" aria-pressed="true" style="--filter-color: #4CAF50;">
                                    <span class="map-filter-dot" aria-hidden="true"></span>
                                    <span>Aree</span>
                                </button>
                                <button class="map-filter-chip is-active" type="button" data-poi-type="Città" aria-pressed="true" style="--filter-color: #f44336;">
                                    <span class="map-filter-dot" aria-hidden="true"></span>
                                    <span>Città</span>
                                </button>
                                <button class="map-filter-chip is-active" type="button" data-poi-type="Luogo Generico" aria-pressed="true" style="--filter-color: #2196F3;">
                                    <span class="map-filter-dot" aria-hidden="true"></span>
                                    <span>Luoghi</span>
                                </button>
                            </div>
                        </div>
                        <div class="poi-list" id="poi-list"></div>
                    </aside>

                    <aside class="info-panel" id="info-panel" aria-live="polite">
                        <button class="map-icon-btn info-panel-close" id="close-info-panel-btn" type="button" title="Chiudi dettagli" aria-label="Chiudi dettagli">
                            <i class="fas fa-xmark" aria-hidden="true"></i>
                        </button>
                        <div class="info-panel-inner" id="info-panel-inner"></div>
                    </aside>

                    <div class="map-empty-state" id="map-empty-state">
                        Seleziona un luogo dalla mappa o dalla lista per aprire i dettagli.
                    </div>
                </div>
            </section>
        </div>

        <div id="dev-tools-container" style="display: none; background: #111; color: #fff; padding: 1rem; border-top: 1px solid var(--gold-dim); margin-top: 2rem;">
            <h3>Dev Tools</h3>
            <ul id="dev-poi-list" style="list-style: none; padding: 0; margin: 1rem 0;"></ul>
            <button id="dev-copy-btn">Copy POIs</button>
        </div>
    </main>

    <div class="map-modal" id="map-modal">
        <div class="map-modal-content">
            <div class="map-modal-controls">
                <button id="toggle-poi-btn" title="Mostra/Nascondi Punti di Interesse" aria-label="Mostra o nascondi POI">
                    <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                </button>
                <button id="close-fullscreen-btn" title="Chiudi" aria-label="Chiudi">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
            <div class="map-container" id="fullscreen-map-container"></div>
        </div>
    </div>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/shared/map-icons.js"></script>
    <script src="../assets/js/map.js"></script>
    <script src="../assets/js/map-fullscreen.js"></script>
</body>
</html>
